<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Padel Score</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
  <style>
    body {
      background: linear-gradient(135deg,#0f172a,#1e293b);
      color:white;
      overflow:hidden;
    }

    h2 { font-weight:700; }

    .card {
      border-radius:24px;
      border:none;
      box-shadow:0 10px 30px rgba(0,0,0,0.4);
    }

    .team-card {
      transition:0.3s;
    }

    .team-card:active {
      transform:scale(0.97);
    }

    .score {
      font-size:72px;
      font-weight:800;
      letter-spacing:2px;
    }

    .btn-action {
      padding:18px;
      font-size:22px;
      border-radius:14px;
    }

    .blink { animation: blinkAnim 1s infinite; }
    @keyframes blinkAnim {
      0% { background-color: #16a34a; }
      50% { background-color: #22c55e; }
      100% { background-color: #16a34a; }
    }

    .info-card {
      font-size:18px;
      font-weight:500;
    }

    .header-box {
      background: rgba(255,255,255,0.05);
      border-radius:16px;
      padding:12px;
    }

    canvas {
      position: fixed;
      top: 0;
      left: 0;
      pointer-events: none;
    }
  </style>
</head>
<body>
<canvas id="confetti"></canvas>

<div class="container py-3">
  <h2 class="text-center mb-3">🎾 Padel Score</h2>

  <div class="header-box mb-3">
    <div class="row g-2">
      <div class="col-6">
        <select class="form-select" id="mode" onchange="changeMode()">
          <option value="americano">Americano</option>
          <option value="mexicano">Mexicano</option>
        </select>
      </div>
      <div class="col-6">
        <input type="number" id="target" class="form-control" value="21">
      </div>
    </div>
  </div>

  <div class="row g-3">
    <div class="col-6">
      <div id="teamAcard" class="card team-card text-center p-3" style="background:linear-gradient(135deg,#3b82f6,#1d4ed8)">
        <h5>Team A</h5>
        <div id="scoreA" class="score">0</div>
        <div class="d-flex gap-2 mt-3">
          <button class="btn btn-light w-100 btn-action" onclick="changeScore('A',1)">+1</button>
          <button class="btn btn-dark w-100 btn-action" onclick="changeScore('A',-1)">-1</button>
        </div>
      </div>
    </div>

    <div class="col-6">
      <div id="teamBcard" class="card team-card text-center p-3" style="background:linear-gradient(135deg,#ef4444,#991b1b)">
        <h5>Team B</h5>
        <div id="scoreB" class="score">0</div>
        <div class="d-flex gap-2 mt-3">
          <button class="btn btn-light w-100 btn-action" onclick="changeScore('B',1)">+1</button>
          <button class="btn btn-dark w-100 btn-action" onclick="changeScore('B',-1)">-1</button>
        </div>
      </div>
    </div>
  </div>

  <div class="text-center mt-3">
    <button class="btn btn-warning w-100 btn-action" onclick="resetScore()">Reset Score</button>
  </div>

  <div id="infoCard" class="card info-card mt-3 p-3 text-center bg-secondary">
    <div id="info">Mode: Americano</div>
  </div>
</div>

<audio id="winSound" src="https://www.soundjay.com/buttons/sounds/button-3.mp3"></audio>

<script>
let scoreA = 0;
let scoreB = 0;
let mode = 'americano';
const MAX_SCORE = 10;

const scoreAEl = document.getElementById('scoreA');
const scoreBEl = document.getElementById('scoreB');

function changeMode() {
  mode = document.getElementById('mode').value;
  resetScore();
}

function changeScore(team, value) {
  if(team === 'A') {
    scoreA = Math.max(0, scoreA + value);
    scoreAEl.innerText = scoreA;
  } else {
    scoreB = Math.max(0, scoreB + value);
    scoreBEl.innerText = scoreB;
  }
  checkLogic();
}

function triggerWinEffect(text, winnerTeam = null) {
  let infoCard = document.getElementById('infoCard');
  document.getElementById('info').innerText = text;

  infoCard.classList.remove('bg-secondary');
  infoCard.classList.add('bg-success','blink');

  // reset blink tim
  document.getElementById('teamAcard').classList.remove('blink');
  document.getElementById('teamBcard').classList.remove('blink');

  // kasih blink ke pemenang
  if(winnerTeam === 'A') {
    document.getElementById('teamAcard').classList.add('blink');
  } else if(winnerTeam === 'B') {
    document.getElementById('teamBcard').classList.add('blink');
  }

  document.getElementById('winSound').play();
  startConfetti();
}

function checkLogic() {
  let infoCard = document.getElementById('infoCard');
  infoCard.classList.remove('blink','bg-success');
  infoCard.classList.add('bg-secondary');

  if(mode === 'americano') {
    let target = parseInt(document.getElementById('target').value) || 21;
    let total = scoreA + scoreB;

    if(total >= target) {
      let winner = scoreA > scoreB ? 'Team A' : scoreB > scoreA ? 'Team B' : 'Draw';
      triggerWinEffect(`Match selesai! Pemenang: ${winner}`, winner === 'Team A' ? 'A' : winner === 'Team B' ? 'B' : null);
    } else {
      document.getElementById('info').innerText = `Americano: ${total}/${target}`;
    }
  } else {
    if(scoreA >= MAX_SCORE) triggerWinEffect('Team A Menang! 🎉','A');
    if(scoreB >= MAX_SCORE) triggerWinEffect('Team B Menang! 🎉','B');
  }
}

function stopConfetti() {
  confettiRunning = false;
  ctx.clearRect(0,0,canvas.width,canvas.height);
}

function resetScore() {
  scoreA = 0;
  scoreB = 0;
  scoreAEl.innerText = 0;
  scoreBEl.innerText = 0;

  let infoCard = document.getElementById('infoCard');
  infoCard.classList.remove('blink','bg-success');
  infoCard.classList.add('bg-secondary');

  // reset blink tim
  document.getElementById('teamAcard').classList.remove('blink');
  document.getElementById('teamBcard').classList.remove('blink');

  document.getElementById('info').innerText = 'Mode: ' + mode;

  // stop confetti saat reset
  stopConfetti();
}

// CONFETTI
const canvas = document.getElementById('confetti');
const ctx = canvas.getContext('2d');
canvas.width = window.innerWidth;
canvas.height = window.innerHeight;

let pieces = [];
let confettiRunning = false;

function startConfetti() {
  confettiRunning = true;
  pieces = Array.from({length:120}, () => ({
    x: Math.random()*canvas.width,
    y: Math.random()*canvas.height,
    r: Math.random()*6+4,
    d: Math.random()*50
  }));
  animateConfetti();
}

function animateConfetti() {
  if(!confettiRunning) return;

  ctx.clearRect(0,0,canvas.width,canvas.height);
  pieces.forEach(p => {
    ctx.beginPath();
    const colors = ['#ef4444','#f43f5e','#ec4899','#fb7185','#be123c'];
    ctx.fillStyle = colors[Math.floor(Math.random()*colors.length)];
    ctx.arc(p.x,p.y,p.r,0,Math.PI*2);
    ctx.fill();
  });
  pieces.forEach(p => {
    p.y += Math.cos(p.d)+2;
    if(p.y > canvas.height) p.y = 0;
  });
  requestAnimationFrame(animateConfetti);
}
</script>
</body>
</html>
