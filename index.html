<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Padel Score</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">

<style>
body {
  background: radial-gradient(circle at top, #1e293b, #020617);
  color: white;
  overflow-x: hidden;
  overflow-y: auto;
}

h2 {
  font-weight: 800;
}

/* CARD */
.card {
  border-radius: 22px;
  border: none;
  box-shadow: 0 15px 40px rgba(0,0,0,0.5);
}

/* TEAM */
.teamA {
  background: linear-gradient(135deg, #06b6d4, #1d4ed8);
}
.teamB {
  background: linear-gradient(135deg, #f97316, #dc2626);
}

.score {
  font-size: 72px;
  font-weight: 900;
}

.btn-action {
  padding: 14px;
  font-size: 18px;
  border-radius: 14px;
}

/* BLINK */
.blink {
  animation: blinkAnim 0.8s infinite;
}
@keyframes blinkAnim {
  50% { filter: brightness(1.5); }
}

/* INFO */
.info-card {
  font-size: 16px;
  font-weight: 600;
  background: rgba(255,255,255,0.08);
}

/* WINNER */
.winner-banner {
  margin-top: 10px;
  padding: 20px;
  border-radius: 20px;
  background: linear-gradient(135deg, #22c55e, #16a34a);
  box-shadow: 0 10px 30px rgba(0,0,0,0.5);
  animation: popIn 0.4s ease;
}

#winnerText {
  font-size: 42px;
  font-weight: 900;
  letter-spacing: 2px;
}

@keyframes popIn {
  from { transform: scale(0.8); opacity: 0; }
  to { transform: scale(1); opacity: 1; }
}

canvas {
  position: fixed;
  top: 0;
  left: 0;
  pointer-events: none;
}
</style>
</head>

<body>

<canvas id="confetti"></canvas>

<div class="container py-2">

<h2 class="text-center mb-2">🎾 PADEL SCORE</h2>

<!-- INPUT PLAYER -->
<div class="card p-2 mb-2">
  <div class="row g-2">
    <div class="col-6">
      <input id="a1" class="form-control" placeholder="Team A - Player 1">
    </div>
    <div class="col-6">
      <input id="a2" class="form-control" placeholder="Team A - Player 2">
    </div>
    <div class="col-6">
      <input id="b1" class="form-control" placeholder="Team B - Player 1">
    </div>
    <div class="col-6">
      <input id="b2" class="form-control" placeholder="Team B - Player 2">
    </div>

    <div class="col-12">
      <select id="firstServer" class="form-select">
        <option value="">-- Pilih Server Pertama --</option>
        <option value="A1">Team A - Player 1</option>
        <option value="A2">Team A - Player 2</option>
        <option value="B1">Team B - Player 1</option>
        <option value="B2">Team B - Player 2</option>
      </select>
    </div>
  </div>
</div>

<!-- SCORE -->
<div class="row g-2">
  
  <div class="col-6">
    <div id="teamAcard" class="card teamA text-center p-2">
      <h5 id="teamAname">Team A</h5>
      <div id="scoreA" class="score">0</div>
      <div class="d-flex gap-2 mt-2">
        <button class="btn btn-light w-100 btn-action" onclick="changeScore('A',1)">+1</button>
        <button class="btn btn-dark w-100 btn-action" onclick="changeScore('A',-1)">-1</button>
      </div>
    </div>
  </div>

  <div class="col-6">
    <div id="teamBcard" class="card teamB text-center p-2">
      <h5 id="teamBname">Team B</h5>
      <div id="scoreB" class="score">0</div>
      <div class="d-flex gap-2 mt-2">
        <button class="btn btn-light w-100 btn-action" onclick="changeScore('B',1)">+1</button>
        <button class="btn btn-dark w-100 btn-action" onclick="changeScore('B',-1)">-1</button>
      </div>
    </div>
  </div>

</div>

<!-- RESET -->
<div class="text-center mt-3">
  <button class="btn btn-warning px-5 btn-action" onclick="resetScore()">RESET</button>
</div>

<!-- WINNER -->
<div id="winnerBanner" class="winner-banner text-center d-none">
  <div id="winnerText"></div>
</div>

<!-- INFO -->
<div id="infoCard" class="card info-card mt-2 p-2 text-center">
  <div id="info">Target: 21</div>
  <div id="serverInfo">Server: -</div>
</div>

</div>

<audio id="winSound" src="https://www.soundjay.com/buttons/sounds/button-3.mp3"></audio>

<script>
let scoreA = 0;
let scoreB = 0;
const TARGET = 21;

let serverOrder = [];
let currentServerIndex = 0;

const scoreAEl = document.getElementById('scoreA');
const scoreBEl = document.getElementById('scoreB');

/* SCORE */
function changeScore(team, value) {
  if(team === 'A') {
    scoreA = Math.max(0, scoreA + value);
    scoreAEl.innerText = scoreA;
  } else {
    scoreB = Math.max(0, scoreB + value);
    scoreBEl.innerText = scoreB;
  }
  checkLogic();
}

/* PLAYER NAME */
function updateNames() {
  let a1 = document.getElementById('a1').value || 'A1';
  let a2 = document.getElementById('a2').value || 'A2';
  let b1 = document.getElementById('b1').value || 'B1';
  let b2 = document.getElementById('b2').value || 'B2';

  document.getElementById('teamAname').innerText = a1 + " / " + a2;
  document.getElementById('teamBname').innerText = b1 + " / " + b2;
}

/* SERVER */
function initServer() {
  let first = document.getElementById('firstServer').value;
  if(!first) return;

  serverOrder = ['A1','A2','B1','B2'];

  while(serverOrder[0] !== first) {
    serverOrder.push(serverOrder.shift());
  }

  currentServerIndex = 0;
  updateServerDisplay();
}

function updateServerDisplay() {
  if(serverOrder.length === 0) return;
  let current = serverOrder[currentServerIndex];
  document.getElementById('serverInfo').innerText = "Server: " + current;
}

/* LOGIC */
function checkLogic() {
  let total = scoreA + scoreB;

  updateNames();

  if(serverOrder.length === 0) {
    initServer();
  }

  if(total > 0 && total % 5 === 0) {
    currentServerIndex = (currentServerIndex + 1) % serverOrder.length;
    updateServerDisplay();
  }

  if(total >= TARGET) {
    let winner = scoreA > scoreB ? 'Team A' : scoreB > scoreA ? 'Team B' : 'DRAW';
    triggerWinEffect(winner, winner === 'Team A' ? 'A' : winner === 'Team B' ? 'B' : null);
  } else {
    document.getElementById('info').innerText = total + " / " + TARGET;
  }
}

/* WIN */
function triggerWinEffect(text, winnerTeam = null) {
  document.getElementById('info').innerText = "";

  let banner = document.getElementById('winnerBanner');
  let textEl = document.getElementById('winnerText');

  textEl.innerText = "🏆 " + text.toUpperCase();
  banner.classList.remove('d-none');

  document.getElementById('teamAcard').classList.remove('blink');
  document.getElementById('teamBcard').classList.remove('blink');

  if(winnerTeam === 'A') {
    document.getElementById('teamAcard').classList.add('blink');
  } else if(winnerTeam === 'B') {
    document.getElementById('teamBcard').classList.add('blink');
  }

  document.getElementById('winSound').play();
  startConfetti();
}

/* RESET */
function resetScore() {
  scoreA = 0;
  scoreB = 0;

  scoreAEl.innerText = 0;
  scoreBEl.innerText = 0;

  document.getElementById('info').innerText = 'Target: 21';

  document.getElementById('teamAcard').classList.remove('blink');
  document.getElementById('teamBcard').classList.remove('blink');

  document.getElementById('winnerBanner').classList.add('d-none');

  serverOrder = [];
  currentServerIndex = 0;
  document.getElementById('serverInfo').innerText = "Server: -";

  stopConfetti();
}

/* CONFETTI */
const canvas = document.getElementById('confetti');
const ctx = canvas.getContext('2d');
canvas.width = window.innerWidth;
canvas.height = window.innerHeight;

let pieces = [];
let confettiRunning = false;

function startConfetti() {
  confettiRunning = true;
  pieces = Array.from({length:120}, () => ({
    x: Math.random()*canvas.width,
    y: Math.random()*canvas.height,
    r: Math.random()*6+4,
    d: Math.random()*50
  }));
  animateConfetti();
}

function animateConfetti() {
  if(!confettiRunning) return;

  ctx.clearRect(0,0,canvas.width,canvas.height);

  const colors = ['#22c55e','#3b82f6','#f97316','#eab308','#ec4899'];

  pieces.forEach(p => {
    ctx.beginPath();
    ctx.fillStyle = colors[Math.floor(Math.random()*colors.length)];
    ctx.arc(p.x,p.y,p.r,0,Math.PI*2);
    ctx.fill();
  });

  pieces.forEach(p => {
    p.y += Math.cos(p.d)+2;
    if(p.y > canvas.height) p.y = 0;
  });

  requestAnimationFrame(animateConfetti);
}

function stopConfetti() {
  confettiRunning = false;
  ctx.clearRect(0,0,canvas.width,canvas.height);
}
</script>

</body>
</html>
