<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Padel Score</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">

<style>
body {
  background: #ffffff;
  color: #111;
}

/* TITLE */
h2 {
  font-weight: 800;
}

/* CARD */
.card {
  border-radius: 20px;
  border: none;
  box-shadow: 0 10px 25px rgba(0,0,0,0.1);
}

/* TEAM */
.teamA {
  background: linear-gradient(135deg, #38bdf8, #2563eb);
  color: white;
}
.teamB {
  background: linear-gradient(135deg, #fb923c, #dc2626);
  color: white;
}

/* SCORE */
.score {
  font-size: 70px;
  font-weight: 900;
}

/* BUTTON */
.btn-action {
  padding: 14px;
  font-size: 18px;
  border-radius: 14px;
}

/* INFO */
.info-card {
  font-size: 20px;
  font-weight: 700;
  background: #f1f5f9;
}

/* WINNER */
.winner-banner {
  margin-top: 10px;
  padding: 20px;
  border-radius: 20px;
  background: linear-gradient(135deg, #22c55e, #16a34a);
  color: white;
  text-align: center;
}

#winnerText {
  font-size: 40px;
  font-weight: 900;
}

/* BLINK */
.blink {
  animation: blinkAnim 0.8s infinite;
}
@keyframes blinkAnim {
  50% { transform: scale(1.05); }
}
</style>
</head>

<body>

<div class="container py-3">

<h2 class="text-center mb-3">🎾 PADEL SCORE</h2>

<!-- INPUT -->
<div class="card p-3 mb-3">
  <div class="row g-2">
    <div class="col-6">
      <input id="a1" class="form-control" placeholder="Team A - Player 1">
    </div>
    <div class="col-6">
      <input id="a2" class="form-control" placeholder="Team A - Player 2">
    </div>
    <div class="col-6">
      <input id="b1" class="form-control" placeholder="Team B - Player 1">
    </div>
    <div class="col-6">
      <input id="b2" class="form-control" placeholder="Team B - Player 2">
    </div>

    <div class="col-12">
      <select id="firstServer" class="form-select">
  <option value="">-- Pilih Server Pertama --</option>
      </select>
    </div>
  </div>
</div>

<!-- SCORE -->
<div class="row g-2">

  <div class="col-6">
    <div id="teamAcard" class="card teamA text-center p-3">
      <h5 id="teamAname">Team A</h5>
      <div id="scoreA" class="score">0</div>
      <div class="d-flex gap-2 mt-2">
        <button class="btn btn-light w-100 btn-action" onclick="changeScore('A',1)">+1</button>
        <button class="btn btn-dark w-100 btn-action" onclick="changeScore('A',-1)">-1</button>
      </div>
    </div>
  </div>

  <div class="col-6">
    <div id="teamBcard" class="card teamB text-center p-3">
      <h5 id="teamBname">Team B</h5>
      <div id="scoreB" class="score">0</div>
      <div class="d-flex gap-2 mt-2">
        <button class="btn btn-light w-100 btn-action" onclick="changeScore('B',1)">+1</button>
        <button class="btn btn-dark w-100 btn-action" onclick="changeScore('B',-1)">-1</button>
      </div>
    </div>
  </div>

</div>

<!-- RESET -->
<div class="text-center mt-3">
  <button class="btn btn-warning px-5 btn-action" onclick="resetScore()">RESET</button>
</div>

<!-- INFO SCORE -->
<div id="infoCard" class="card info-card mt-3 p-3 text-center">
  <div id="info">0 / 21</div>
  <div id="serverInfo">Server: -</div>
</div>

<!-- WINNER -->
<div id="winnerBanner" class="winner-banner d-none">
  <div id="winnerText"></div>
</div>

</div>

<script>
let scoreA = 0;
let scoreB = 0;
const TARGET = 21;

let serverOrder = [];
let currentServerIndex = 0;
let gameFinished = false;

const scoreAEl = document.getElementById('scoreA');
const scoreBEl = document.getElementById('scoreB');

/* SCORE */
function changeScore(team, value) {

  if(gameFinished) return; // 🔒 LOCK saat selesai

  if(team === 'A') {
    scoreA = Math.max(0, scoreA + value);
  } else {
    scoreB = Math.max(0, scoreB + value);
  }

  scoreAEl.innerText = scoreA;
  scoreBEl.innerText = scoreB;

  checkLogic();
}

/* PLAYER */
function updateNames() {
  let a1 = document.getElementById('a1').value || 'A1';
  let a2 = document.getElementById('a2').value || 'A2';
  let b1 = document.getElementById('b1').value || 'B1';
  let b2 = document.getElementById('b2').value || 'B2';

  document.getElementById('teamAname').innerText = a1 + " / " + a2;
  document.getElementById('teamBname').innerText = b1 + " / " + b2;
}

/* SERVER */
function initServer() {
  let first = document.getElementById('firstServer').value;
  if(!first) return;

  // BASE ORDER DIAGONAL
  let baseOrder = ['A1','B1','A2','B2'];

  // Cari pasangan diagonal dari first
  let diagonalMap = {
    A1: 'B1',
    B1: 'A2',
    A2: 'B2',
    B2: 'A1'
  };

  // Susun order mulai dari first
  serverOrder = [];
  let current = first;

  for(let i=0; i<4; i++) {
    serverOrder.push(current);
    current = diagonalMap[current];
  }

  currentServerIndex = 0;
  updateServerDisplay();
}

function updateServerDisplay() {
  if(serverOrder.length === 0) return;

  let code = serverOrder[currentServerIndex];
  let name = getPlayerName(code);

  document.getElementById('serverInfo').innerText =
    "Server: " + name;
}

/* LOGIC */
function checkLogic() {

  let total = scoreA + scoreB;

  updateNames();

  if(serverOrder.length === 0) initServer();

  // AUTO ROTATE SERVER
  if(total > 0 && total % 5 === 0) {
    currentServerIndex = (currentServerIndex + 1) % serverOrder.length;
    updateServerDisplay();
  }

  // UPDATE SCORE INFO
  document.getElementById('info').innerText = total + " / " + TARGET;

  // WIN CONDITION
  if(total >= TARGET) {
    gameFinished = true;

    let winner =
      scoreA > scoreB ? 'Team A' :
      scoreB > scoreA ? 'Team B' : 'DRAW';

    showWinner(winner);
  }
}

/* WIN */
function showWinner(text) {

  let banner = document.getElementById('winnerBanner');
  let textEl = document.getElementById('winnerText');

  textEl.innerText = "🏆 " + text.toUpperCase();
  banner.classList.remove('d-none');

  document.getElementById('teamAcard').classList.remove('blink');
  document.getElementById('teamBcard').classList.remove('blink');

  if(text === 'Team A') {
    document.getElementById('teamAcard').classList.add('blink');
  } else if(text === 'Team B') {
    document.getElementById('teamBcard').classList.add('blink');
  }
}

/* RESET */
function resetScore() {
  scoreA = 0;
  scoreB = 0;
  gameFinished = false;

  // reset score
  scoreAEl.innerText = 0;
  scoreBEl.innerText = 0;

  document.getElementById('info').innerText = '0 / 21';

  // reset winner
  document.getElementById('winnerBanner').classList.add('d-none');

  document.getElementById('teamAcard').classList.remove('blink');
  document.getElementById('teamBcard').classList.remove('blink');

  // 🔥 RESET NAMA PLAYER
  document.getElementById('a1').value = '';
  document.getElementById('a2').value = '';
  document.getElementById('b1').value = '';
  document.getElementById('b2').value = '';

  document.getElementById('teamAname').innerText = 'Team A';
  document.getElementById('teamBname').innerText = 'Team B';

  // 🔥 RESET SERVER
  document.getElementById('firstServer').value = '';
  serverOrder = [];
  currentServerIndex = 0;
  document.getElementById('serverInfo').innerText = "Server: -";
}

function getPlayerName(code) {
  let a1 = document.getElementById('a1').value || 'A1';
  let a2 = document.getElementById('a2').value || 'A2';
  let b1 = document.getElementById('b1').value || 'B1';
  let b2 = document.getElementById('b2').value || 'B2';

  const map = {
    A1: a1,
    A2: a2,
    B1: b1,
    B2: b2
  };

  return map[code] || code;
}

function updateServerOptions() {
  let a1 = document.getElementById('a1').value || 'A1';
  let a2 = document.getElementById('a2').value || 'A2';
  let b1 = document.getElementById('b1').value || 'B1';
  let b2 = document.getElementById('b2').value || 'B2';

  let select = document.getElementById('firstServer');

  let currentValue = select.value; // biar gak reset pilihan user

  select.innerHTML = `
    <option value="">-- Pilih Server Pertama --</option>
    <option value="A1">${a1}</option>
    <option value="A2">${a2}</option>
    <option value="B1">${b1}</option>
    <option value="B2">${b2}</option>
  `;

  select.value = currentValue; // restore pilihan kalau masih ada
}

document.getElementById('a1').addEventListener('input', updateServerOptions);
document.getElementById('a2').addEventListener('input', updateServerOptions);
document.getElementById('b1').addEventListener('input', updateServerOptions);
document.getElementById('b2').addEventListener('input', updateServerOptions);

updateServerOptions();

</script>

</body>
</html>
